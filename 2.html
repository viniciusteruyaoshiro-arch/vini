<title>teste</title>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Saúde da Família</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #efefef;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 1000px;
      height: 430px;
      background: white;
      display: flex;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    /* LADO ESQUERDO */
    .left-panel {
      width: 230px;
      background: linear-gradient(135deg, #5fd1c9, #2d9fa4);
      padding: 18px;
      color: black;
      position: relative;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d7ff4f, #0097a7);
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgb(255, 161, 161);
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 6px;
      border: 3px solid rgba(255,255,255,0.6);
    }

    .logo h3 {
      font-size: 15px;
      text-align: center;
      line-height: 18px;
    }

    .title {
      margin-top: 8px;
      margin-bottom: 16px;
      font-size: 20px;
      line-height: 28px;
      font-family: Georgia, serif;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #f2eaea;
      font-size: 14px;
    }

    .btn-login {
      width: 100%;
      margin: 12px auto;
      display: block;
      padding: 8px;
      border: 1px solid #002db3;
      border-radius: 5px;
      background: #0a56ff;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #003fcb;
      color: white;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 18px 0;
      color: #333;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #333;
    }

    .divider span {
      margin: 0 10px;
    }

    .google-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .google-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(45deg, red, yellow, green, blue);
    }

    .signup {
      margin-top: 16px;
      font-size: 14px;
    }

    .signup a {
      color: blue;
    }

    /* LADO DIREITO */
    .right-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #ddd;
    }

    .top-header {
      width: 100%;
      height: 100px;
      background: #f4f4f4;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .line {
      position: absolute;
      border-radius: 20px;
      border: 4px solid;
    }

    .red {
      width: 130px;
      height: 130px;
      border-color: #ff3b3b;
      top: -60px;
      left: 20px;
    }

    .yellow {
      width: 170px;
      height: 170px;
      border-color: #ffd400;
      top: -95px;
      left: 180px;
    }

    .blue {
      width: 160px;
      height: 160px;
      border-color: #2357d8;
      bottom: -90px;
      left: 60px;
    }

    .green {
      width: 140px;
      height: 140px;
      border-color: #3eb54a;
      bottom: -90px;
      right: 30px;
    }

    .brand {
      width: 280px;
      height: 60px;
      background: white;
      border-radius: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      font-weight: bold;
      color: #555;
      z-index: 10;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .hero {
      width: 100%;
      height: calc(100% - 100px);
      background: url('https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200&auto=format&fit=crop') center center/cover;
      filter: blur(2px);
      transform: scale(1.02);
    }

    .floating-btn {
      position: absolute;
      right: 20px;
      bottom: 15px;
      padding: 2px 8px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .container {
        width: 95%;
        height: auto;
        flex-direction: column;
      }

      .left-panel {
        width: 100%;
      }

      .right-panel {
        height: 350px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="left-panel">
      <div class="logo">
        <div class="logo-circle">+</div>
        <h3>SISTEMA<br>ESF</h3>
      </div>

      <div class="title">
        Bem-Vindo à<br>
        Saúde da família
      </div>

      <div class="input-group">
        <input type="text" placeholder="✉ email/cpf">
      </div>

      <div class="input-group">
        <input type="password" placeholder="🔒 senha">
      </div>

      <button class="btn-login">Entrar</button>

      <div class="divider">
        <span>ou</span>
      </div>

      <button class="google-btn">
        <div class="google-icon"></div>
        Google
      </button>

      <div class="signup">
        não tem uma conta?
        <a href="#">[criar conta]</a>
      </div>
    </div>

    <div class="right-panel">
      <div class="top-header">
        <div class="line red"></div>
        <div class="line yellow"></div>
        <div class="line blue"></div>
        <div class="line green"></div>

        <div class="brand">
          Saúde da Família
        </div>
      </div>

      <div class="hero"></div>

      <button class="floating-btn">meu botão</button>
    </div>

  </div>

</body>
</html>
